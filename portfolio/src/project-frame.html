<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khung dự án - VINHTRAN</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&family=Geist:wght@700;800&display=swap');
 
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
  :root {
    --bg: #0e0e0e;
    --bg2: #161616;
    --bg3: #1e1e1e;
    --bg4: #252525;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #e4e1e7;
    --text2: #d4c0d7;
    --text3: #606060;
    --accent: #ecb2ff;
    --accent2: #bd00ff;
    --green: #4ade80;
    --yellow: #fbbf24;
    --blue: #60a5fa;
    --red: #f87171;
  }
 
  body {
    background-color: #050505;
    background-image:
      radial-gradient(circle at 50% 50%, rgba(189, 0, 255, 0.05) 0%, transparent 50%),
      linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
    background-size: 100% 100%, 40px 40px, 40px 40px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    line-height: 1.7;
  }

  .top-nav {
    position: fixed;
    inset: 0 0 auto;
    z-index: 50;
    height: 48px;
    background: rgba(19,19,23,0.8);
    backdrop-filter: blur(24px);
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .top-nav-inner {
    max-width: 1280px;
    height: 48px;
    margin: 0 auto;
    padding: 0 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .brand {
    color: var(--accent);
    text-decoration: none;
    font-size: 40px;
    line-height: 48px;
    font-weight: 800;
    letter-spacing: -0.04em;
    font-family: 'Geist', sans-serif;
  }
  .brand:hover { text-shadow: 0 0 10px rgba(189, 0, 255, 0.3); }
  .nav-links { display: flex; align-items: center; gap: 32px; }
  .top-nav-link {
    position: relative;
    display: inline-flex;
    padding: 6px 0;
    color: #d4c0d7;
    font-size: 16px;
    font-weight: 500;
    text-decoration: none;
    transition: color 0.25s ease, transform 0.25s ease;
  }
  .top-nav-link::after {
    content: '';
    position: absolute;
    left: 50%;
    right: 50%;
    bottom: 0;
    height: 2px;
    background: currentColor;
    border-radius: 999px;
    transition: left 0.28s ease, right 0.28s ease;
  }
  .top-nav-link:hover { color: #d3fbff; transform: translateY(-4px); }
  .top-nav-link:hover::after, .top-nav-link.is-active::after { left: 0; right: 0; }
  .top-nav-link.is-active { color: var(--accent); font-weight: 700; }
  .top-connect {
    position: relative;
    overflow: hidden;
    isolation: isolate;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: #fff;
    background: #bd00ff;
    padding: 8px 24px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-decoration: none;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }
  .top-connect::before {
    content: '';
    position: absolute;
    inset: 0;
    z-index: -1;
    background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.28) 45%, transparent 58%);
    transform: translateX(-130%);
    transition: transform 0.55s ease;
  }
  .top-connect:hover {
    transform: translateY(-3px);
    box-shadow: 0 0 22px rgba(189,0,255,0.55), 0 0 40px rgba(211,251,255,0.18);
  }
  .top-connect:hover::before { transform: translateX(130%); }
  .top-connect .material-symbols-outlined { transition: transform 0.25s ease; }
  .top-connect:hover .material-symbols-outlined { transform: translateX(5px); }
 
  /* ── BREADCRUMB ── */
  .breadcrumb {
    padding: 8px 16px;
    font-size: 12px;
    color: var(--text2);
    background: rgba(31,31,35,0.5);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 32px;
    transition: transform 0.3s ease, border-color 0.3s ease, color 0.3s ease, background 0.3s ease;
  }
  .breadcrumb:hover {
    color: var(--accent);
    background: var(--bg3);
    border-color: rgba(236,178,255,0.4);
    transform: translateX(-4px);
  }
  .breadcrumb a { color: inherit; text-decoration: none; }
  .breadcrumb span { color: inherit; }
 
  /* ── HERO ── */
  .hero {
    padding: 0 0 64px;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 400px; height: 300px;
    background: radial-gradient(ellipse at top right, rgba(168,85,247,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-tag {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    background: rgba(236,178,255,0.1);
    border: 1px solid rgba(236,178,255,0.2);
    padding: 3px 10px;
    border-radius: 3px;
    margin-bottom: 16px;
    letter-spacing: 0.05em;
  }
  .hero h1 {
    font-size: 40px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.2;
    margin-bottom: 12px;
    max-width: 900px;
  }
  .hero-sub {
    color: var(--text2);
    font-size: 15px;
    max-width: 600px;
    line-height: 1.6;
    margin-bottom: 24px;
  }
  .hero-tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .tag {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text2);
    font-family: 'JetBrains Mono', monospace;
  }
 
  /* ── LAYOUT ── */
.page { width: 100%; max-width: 1280px; margin: 0 auto; padding: 128px 64px 0; }
  .hero, .section { width: 100%; max-width: none; }
  .hero { padding: 0; }
  header.mb-16 { margin-bottom: 64px; }
  header h1 {
    font-family: 'Geist', sans-serif;
    font-size: 40px;
    line-height: 48px;
    letter-spacing: -0.02em;
    font-weight: 700;
    color: var(--text);
    max-width: 896px;
    margin: 0 0 24px;
  }
  header p {
    color: var(--text2);
    font-size: 18px;
    line-height: 28px;
    max-width: 768px;
    margin: 0;
  }
  .section { padding: 40px 0; border-bottom: 1px solid var(--border); }
  .section:last-child { border-bottom: none; }
 
  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 16px;
    letter-spacing: 0.1em;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label .material-symbols-outlined {
    font-size: 18px;
    line-height: 1;
  }

  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    vertical-align: middle;
  }

  .action-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 24px;
    margin-top: 80px;
  }
  .top-actions {
    justify-content: flex-start;
    margin: 0 0 32px;
    padding: 0 40px;
  }
  .back-button,
  .doc-download-btn,
  .next-lesson-btn {
    position: relative;
    overflow: hidden;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border-radius: 8px;
    padding: 8px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 16px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-decoration: none;
    border: 1px solid var(--border);
    transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease, color 0.25s ease, background 0.25s ease;
  }
  .back-button {
    color: var(--text2);
    background: rgba(31,31,35,0.5);
    margin-bottom: 32px;
    width: fit-content;
    border-radius: 4px;
  }

  .doc-download-btn {
    gap: 12px;
    padding: 16px 32px;
    border-radius: 8px;
  }

  .next-lesson-btn {
    gap: 8px;
    padding: 16px 40px;
    border-radius: 8px;
  }
  .back-button:hover {
    color: var(--accent);
    border-color: rgba(236,178,255,0.45);
    background: rgba(31,31,35,0.85);
    transform: translateX(-4px);
  }
  .back-button .material-symbols-outlined { transition: transform 0.25s ease; }
  .back-button:hover .material-symbols-outlined { transform: scale(1.1); }
  .doc-download-btn {
    color: #ffe1e2;
    background: linear-gradient(135deg, rgba(255, 90, 95, 0.16), rgba(189, 0, 255, 0.08));
    border-color: rgba(255, 90, 95, 0.46);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
  }
  .doc-download-btn::before,
  .next-lesson-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.2) 45%, transparent 60%);
    transform: translateX(-130%);
    transition: transform 0.55s ease;
  }
  .doc-download-btn:hover {
    color: #ffffff;
    transform: translateY(-3px);
    border-color: rgba(255, 90, 95, 0.9);
    box-shadow: 0 0 18px rgba(255,90,95,0.32), 0 0 30px rgba(189,0,255,0.12);
  }
  .doc-download-btn:hover::before,
  .next-lesson-btn:hover::before { transform: translateX(130%); }
  .doc-download-btn > *,
  .next-lesson-btn > * { position: relative; z-index: 1; }
  .pdf-icon {
    color: #ff5a5f;
    filter: drop-shadow(0 0 8px rgba(255,90,95,0.45));
  }
  .next-lesson-btn {
    background: #bd00ff;
    color: #ffffff;
    border-color: #bd00ff;
    box-shadow: 0 0 20px rgba(189, 0, 255, 0.4);
    isolation: isolate;
  }
  .next-lesson-btn::before { z-index: 0; }
  .next-lesson-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 30px rgba(189, 0, 255, 0.6);
  }
  .next-lesson-btn:active { transform: scale(0.95); }

  .final-actions {
    display: grid;
    gap: 24px;
    margin-bottom: 120px;
  }
  .final-download-row {
    display: flex;
    justify-content: center;
  }
  .final-nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 24px;
  }
  .final-back-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 16px 32px;
    border-radius: 8px;
    background: #ffffff;
    color: #131317;
    border: 1px solid rgba(255,255,255,0.85);
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    line-height: 24px;
    font-weight: 700;
    letter-spacing: 0;
    text-decoration: none;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }
  .final-back-button:hover {
    transform: translateX(-4px);
    box-shadow: 0 0 24px rgba(255,255,255,0.18);
  }
  .final-nav-row .next-lesson-btn,
  .final-nav-row .final-back-button {
    min-width: 260px;
  }
  .final-actions .next-lesson-btn {
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    line-height: 24px;
    letter-spacing: 0;
  }
 
  /* ── STATS ── */
  .stats-grid {
    display: grid;
    grid-template-columns: minmax(220px, 320px) 1fr;
    gap: 16px;
    align-items: stretch;
  }
  .stats-column {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }
  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
  }
  .stat-label {
    font-size: 11px;
    color: var(--text2);
    margin-bottom: 8px;
    font-family: 'JetBrains Mono', monospace;
  }
  .stat-value {
    font-size: 28px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .source-chart-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    display: grid;
    grid-template-columns: auto 1fr;
    align-items: center;
    gap: 24px;
  }
  .source-pie {
    width: 180px;
    aspect-ratio: 1;
    border-radius: 50%;
    background: conic-gradient(#60a5fa 0 20%, var(--green) 20% 80%, var(--yellow) 80% 100%);
    position: relative;
    box-shadow: 0 0 24px rgba(96, 165, 250, 0.12), inset 0 0 0 1px rgba(255,255,255,0.08);
  }
  .chart-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text2);
    margin-bottom: 16px;
  }
  .chart-legend {
    display: grid;
    gap: 12px;
  }
  .legend-item {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 10px;
    color: var(--text2);
    font-size: 13px;
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 999px;
  }
  .legend-item strong {
    color: var(--text);
    font-size: 14px;
  }
 
  /* ── OBJECTIVE BOX ── */
  .objective-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    padding: 20px 24px;
    color: var(--text);
    font-size: 14px;
    line-height: 1.7;
  }
 
  /* ── THREAT CARDS ── */
  .threats-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 2px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .threat-item {
    background: var(--bg2);
    padding: 22px 24px;
    display: grid;
    grid-template-columns: 44px 1fr auto;
    gap: 16px;
    align-items: start;
  }
  .threat-item:first-child { border-radius: 10px 10px 0 0; }
  .threat-item:last-child { border-radius: 0 0 10px 10px; }
  .threat-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    padding-top: 3px;
    font-weight: 500;
  }
  .threat-body h3 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--text);
  }
  .threat-body p {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.6;
  }
  .threat-body p code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    background: var(--bg4);
    padding: 1px 5px;
    border-radius: 3px;
    color: var(--accent);
  }
  .threat-icon {
    width: 36px; height: 36px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .stat-inline {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    background: rgba(248,113,113,0.1);
    color: var(--red);
    border: 1px solid rgba(248,113,113,0.2);
    padding: 2px 8px;
    border-radius: 3px;
    margin-top: 6px;
    display: block;
    width: fit-content;
  }
 
  /* ── SOLUTIONS ── */
  .solutions-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .solution-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }
  .solution-card h3 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .solution-card h3 .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }
  .solution-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .solution-list li {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.5;
    padding-left: 14px;
    position: relative;
  }
  .solution-list li::before {
    content: '→';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-size: 12px;
  }
 
  /* ── SOURCES TABLE ── */
  .table-wrap {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead tr {
    background: var(--bg3);
    border-bottom: 1px solid var(--border2);
  }
  thead th {
    padding: 12px 14px;
    text-align: left;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
    font-weight: 500;
    white-space: nowrap;
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    transition: background 0.15s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--bg3); }
  td {
    padding: 12px 14px;
    vertical-align: top;
    color: var(--text2);
    line-height: 1.5;
  }
  td:first-child {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text3);
    width: 36px;
  }
  td strong { color: var(--text); font-weight: 500; }
  td em {
    font-style: normal;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    background: var(--bg4);
    padding: 1px 6px;
    border-radius: 3px;
    color: var(--text2);
  }
  .badge {
    display: inline-block;
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 500;
    white-space: nowrap;
  }
  .badge-high { background: rgba(74,222,128,0.1); color: var(--green); border: 1px solid rgba(74,222,128,0.2); }
  .badge-vhigh { background: rgba(96,165,250,0.1); color: var(--blue); border: 1px solid rgba(96,165,250,0.25); }
  .badge-med { background: rgba(251,191,36,0.1); color: var(--yellow); border: 1px solid rgba(251,191,36,0.2); }
 
  /* ── KEY POINTS ── */
  .keypoints {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .keypoint-item {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 14px;
    align-items: baseline;
    font-size: 13.5px;
    color: var(--text2);
    line-height: 1.6;
  }
  .keypoint-item:last-child { border-bottom: none; }
  .keypoint-item::before {
    content: '→';
    color: var(--accent);
    font-size: 13px;
    flex-shrink: 0;
  }
  .keypoint-item strong { color: var(--text); font-weight: 500; }
 
  /* ── CITATION HIGHLIGHT ── */
  .cite-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    font-size: 13px;
    color: var(--text2);
    font-style: italic;
    line-height: 1.6;
    position: relative;
  }
  .cite-box::before {
    content: '"';
    position: absolute;
    top: -4px; left: 10px;
    font-size: 40px;
    color: var(--accent);
    opacity: 0.3;
    font-style: normal;
    line-height: 1;
  }
  .cite-source {
    font-style: normal;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    margin-top: 8px;
    display: block;
  }
 
  /* ── THREAT TYPES GRID ── */
  .sub-types {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 10px;
  }
  .sub-type {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
  }
  .sub-type-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
    font-family: 'JetBrains Mono', monospace;
  }
  .sub-type-desc {
    font-size: 11px;
    color: var(--text2);
    line-height: 1.5;
  }
